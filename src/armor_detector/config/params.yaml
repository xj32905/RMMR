detector_node:
  ros__parameters:
    debug: true
    debug_mode: "result"   # result / red_mask / blue_mask / candidates
    target_color: "red"    # red / blue / all
    target_width: 1280
    gamma: 1.0
    log_interval_ms: 1000

    # 1) 颜色分割：只负责把红/蓝区域从图像里抠出来
    s_min: 70
    v_min: 70
    r_thresh_low_h: 0
    r_thresh_high_h: 10
    r_thresh_low_h2: 170
    r_thresh_high_h2: 180
    b_thresh_low_h: 90
    b_thresh_high_h: 130
    morph_close_size: 3
    morph_open_size: 0

    # 2) 形态筛选：在 mask 结果里只留下“长条形”区域
    min_contour_area: 5.0
    max_contour_area: 50000.0
    min_aspect_ratio: 1.5
    sort_by: "score"       # score=长边*长宽比 / length / area / aspect

    # 3) 装甲板配对：几何验证开关（阈值基于物理约束硬编码，W6 按需开启）
    pair_validation: false   # false=TOP2直接配对, true=启用几何配对验证过滤伪灯条

    # 4) W6 严格灯条筛选：角度约束+填充率校验，过滤背景伪灯条
    strict_lightbar_filter: false  # false=仅面积+长宽比, true=额外校验角度+填充率

    # 5) W7 ROI 裁剪调试 + ONNX 数字识别（可选，默认关闭）
    roi_debug_save: false         # true=保存检测到的装甲板 ROI 样例，用于检查裁剪是否正确
    roi_debug_dir: "src/armor_detector/docs/week7_roi_samples"
    roi_debug_max_count: 20
    onnx_enabled: false           # true=启用 ONNX 数字识别
    onnx_model_path: ""           # tiny_resnet.onnx 模型路径

camera_node:
  ros__parameters:
    # source_type: mvs = 海康/MVS 工业相机；opencv = 普通UVC摄像头或视频文件
    source_type: "mvs"
    video_path: ""          # opencv 模式：为空使用 camera_id；非空播放视频
    camera_id: 0
    mvs_index: 0             # 多个 MVS 相机时选择第几个
    mvs_use_gentl: true      # U3V 相机在 Linux 下通常需要 GenTL/cti
    mvs_cti_path: "/opt/MVS/lib/64/MvProducerU3V.cti"
    topic: "/camera/image"
    frame_id: "camera"
    fps: 60.0
    loop: true
    start_frame: 0
    resize_width: 0
    paused: false

    # MVS 工业相机现场参数，<=0 表示不主动设置
    exposure_time: 3000.0
    gain: 8.0
    auto_exposure: false
    auto_gain: false
    auto_white_balance: false
